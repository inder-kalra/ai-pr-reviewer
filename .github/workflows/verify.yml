name: Verify OAuth-in-CI

# One-off gate test: proves the headless Claude CLI can (a) start with
# CLAUDE_CODE_OAUTH_TOKEN in GitHub Actions and (b) file a GitHub Issue via gh.
# Run manually from the Actions tab. Delete after the gate passes.
on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Headless claude + create issue
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          claude -p "Run this exact command and nothing else: gh issue create --title '[VERIFY] OAuth-in-CI works' --body 'Headless Claude CLI ran in GitHub Actions with the OAuth token and successfully filed this issue. Gate passed.'" \
            --allowedTools "Bash(gh issue create:*)"
