# Caller workflow — copy to a consumer repo at .github/workflows/ai-audit.yml
# Post-merge codebase auditor. Runs on a schedule, files GitHub Issues for findings.
#
# The engine is pinned to an immutable SHA — it runs with your live OAuth token, so
# a mutable tag must not run here. Pair this with .github/dependabot.yml (copy
# templates/dependabot.yml) so Dependabot bumps the SHA on each engine release; its
# first run also fast-forwards this pin to the latest v1.x.y.
name: AI Codebase Audit

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC (~09:00 ET). Adjust cadence as needed.
  workflow_dispatch: {}      # allow manual "Run workflow" / `gh workflow run`

jobs:
  audit:
    uses: inder-kalra/ai-pr-reviewer/.github/workflows/audit.yml@fc4a052de562a5cb0a7f1390f3aea39f6e044693  # v1.0.0
    permissions:
      contents: read
      issues: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # Optional. Emphasize project-specific concerns:
      focus: ""
      # Optional. Scope the audit to a subtree on large repos (e.g. "src/**"):
      paths: ""
