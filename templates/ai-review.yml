# Caller workflow — copy to a consumer repo at .github/workflows/ai-review.yml
# Pre-merge PR reviewer. Runs on every pull request, posts inline comments, and
# goes red (soft gate) on CRITICAL findings.
#
# The engine is pinned to an immutable SHA — it runs with your live OAuth token, so
# a mutable tag must not run here. Pair this with .github/dependabot.yml (copy
# templates/dependabot.yml) so Dependabot bumps the SHA on each engine release; its
# first run also fast-forwards this pin to the latest v1.x.y.
name: AI PR Review

on:
  pull_request: {}

jobs:
  review:
    uses: inder-kalra/ai-pr-reviewer/.github/workflows/review.yml@fc4a052de562a5cb0a7f1390f3aea39f6e044693  # v1.0.0
    permissions:
      contents: read
      pull-requests: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # Optional. Emphasize project-specific concerns:
      focus: ""
